<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producción de Palanquillas - Acería</title>
  <style>
    :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
    body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 500px; }
    h2 { text-align: center; color: #0f172a; margin-bottom: 20px; font-weight: 700; }
    .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 15px; border: 1px solid var(--border); }
    .section-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid #eff6ff; padding-bottom: 5px; font-weight: bold; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .full-width { grid-column: span 2; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #64748b; }
    input, select, textarea { width: 100%; padding: 12px; box-sizing: border-box; border: 1.5px solid var(--border); border-radius: 8px; font-size: 16px; transition: border-color 0.2s; font-family: inherit; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
    .readonly { background-color: #f1f5f9; color: #475569; font-weight: bold; border-style: dashed; }
    /* Estilo para el campo de porcentaje */
    .perc-container { position: relative; }
    .perc-container::after { content: "%"; position: absolute; right: 12px; top: 35px; color: #64748b; font-weight: bold; }
    
    .alerta { background-color: #fef2f2; color: #991b1b; padding: 10px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 15px; border-left: 4px solid #ef4444; display: none; }
    button { width: 100%; padding: 16px; background-color: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
    button:disabled { background-color: #cbd5e1; box-shadow: none; }
  </style>
</head>
<body>

<div class="container">
  <h2>Registro de Coladas</h2>
  <div id="alertaTurno" class="alerta"></div>

  <form id="registroForm">
    <div class="card">
      <div class="section-title">Información General</div>
      <div class="grid">
        <div><label>Fecha</label><input type="date" id="fecha" name="fecha" required></div>
        <div>
          <label>Turno</label>
          <select name="turno" required>
            <option value="">...</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </div>
        <div class="full-width">
          <label>Supervisor</label>
          <select name="supervisor" required>
            <option value="">Seleccionar responsable</option>
            <option value="Braulio Gimenez">Braulio Gimenez</option>
            <option value="Derlis Santacruz">Derlis Santacruz</option>
            <option value="Kevin Lezcano">Kevin Lezcano</option>
            <option value="Rodrigo Farrugio">Rodrigo Farrugio</option>
            <option value="Sergio Quevedo">Sergio Quevedo</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Proceso y Colada</div>
      <div class="grid">
        <div><label>H. Apertura</label><input type="time" name="horaApertura" required></div>
        <div><label>H. Cierre</label><input type="time" name="horaCierre" required></div>
        <div><label>N° Tundish</label><input type="number" name="tundish" required></div>
        <div><label>Secuencia</label><input type="number" name="secuencia" required></div>
        <div class="full-width"><label>N° Colada</label><input type="text" name="colada" required></div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Producción y Rendimiento</div>
      <div class="grid">
        <div><label>L1 (UN)</label><input type="number" id="l1un" name="l1un" required></div>
        <div><label>L1 (M)</label><input type="number" id="l1m" name="l1m" step="any" required></div>
        <div><label>L2 (UN)</label><input type="number" id="l2un" name="l2un" required></div>
        <div><label>L2 (M)</label><input type="number" id="l2m" name="l2m" step="any" required></div>
        
        <div><label>QT. PIEZAS</label><input type="number" id="qtPiezas" name="qtPiezas" readonly class="readonly"></div>
        <div><label>PROD. (T)</label><input type="number" id="produccion" name="produccion" readonly class="readonly"></div>
        
        <div><label>Carga Metálica (T)</label><input type="number" id="carga" step="any"></div>
        <div class="perc-container">
          <label>Rendimiento</label>
          <input type="number" id="rendimiento" name="rendimiento" readonly class="readonly">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Retrasos y Paradas CCM</div>
      <div class="grid">
        <div>
          <label>Delay</label>
          <select id="delay" name="delay" required>
            <option value="NO">No</option>
            <option value="SI">Sí</option>
          </select>
        </div>
        <div>
          <label>Horno Corte</label>
          <select id="hornoCorte" name="hornoCorte" disabled>
            <option value="N/A">N/A</option>
            <option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option>
          </select>
        </div>
        <div>
          <label>Tipo</label>
          <select id="tipoParada" name="tipo" disabled>
            <option value="">Seleccionar</option>
            <option value="OPERACIONAL">Operacional</option>
            <option value="MANTENIMIENTO">Mantenimiento</option>
          </select>
        </div>
        <div>
          <label>Tiempo Parada (min)</label>
          <input type="number" id="tiempoParada" name="tiempoParada" disabled>
        </div>
        <div class="full-width">
          <label>Descripción / Causa</label>
          <textarea name="causa" rows="2"></textarea>
        </div>
      </div>
    </div>

    <button type="submit" id="btnRegistrar">Registrar Producción</button>
  </form>
</div>

<script>
  function cargarFechaLocal() {
    const hoy = new Date();
    const fechaLocal = hoy.getFullYear() + "-" + String(hoy.getMonth() + 1).padStart(2, "0") + "-" + String(hoy.getDate()).padStart(2, "0");
    document.getElementById("fecha").value = fechaLocal;
    
    const horaActual = hoy.getHours();
    const alerta = document.getElementById("alertaTurno");
    if (horaActual >= 0 && horaActual < 6) { 
      alerta.style.display = "block"; 
      alerta.textContent = "⚠️ Registro de madrugada. Verifica la fecha."; 
    } else { 
      alerta.style.display = "none"; 
    }
  }
  
  cargarFechaLocal();

  function calcular() {
    const l1un = parseFloat(document.getElementById("l1un").value) || 0;
    const l1m = parseFloat(document.getElementById("l1m").value) || 0;
    const l2un = parseFloat(document.getElementById("l2un").value) || 0;
    const l2m = parseFloat(document.getElementById("l2m").value) || 0;
    const cargaVal = parseFloat(document.getElementById("carga").value) || 0;

    const prodT = ((l1un * l1m) + (l2un * l2m)) * 0.075;
    
    document.getElementById("qtPiezas").value = (l1un + l2un).toFixed(0);
    document.getElementById("produccion").value = prodT.toFixed(2);

    if (cargaVal > 0) {
      // Calculamos con 1 decimal para el rendimiento
      const rend = (prodT / cargaVal) * 100;
      document.getElementById("rendimiento").value = rend.toFixed(1);
    } else {
      document.getElementById("rendimiento").value = "";
    }
  }

  ["l1un", "l1m", "l2un", "l2m", "carga"].forEach(id => {
    document.getElementById(id).addEventListener("input", calcular);
  });

  document.getElementById("delay").addEventListener("change", function() {
    const isSi = this.value === "SI";
    document.getElementById("tiempoParada").disabled = !isSi;
    document.getElementById("tipoParada").disabled = !isSi;
    document.getElementById("hornoCorte").disabled = !isSi;
    if(!isSi) { 
      document.getElementById("hornoCorte").value = "N/A"; 
      document.getElementById("tiempoParada").value = ""; 
    }
  });

  document.getElementById("registroForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const btn = document.getElementById("btnRegistrar");
    btn.disabled = true; btn.innerText = "Enviando...";
    
    const url = "https://script.google.com/macros/s/AKfycby6_Yy4Xd0gkVwo9hJKs4QFmUzdg_lQIn_LrY-O3nYgY79LQzi_TN5RVDP-pdctKEf1/exec";
    
    fetch(url, {
      method: "POST",
      body: new FormData(this)
    })
    .then(r => r.text())
    .then(data => { 
      alert(data); 
      if (data.includes("✅")) { 
        this.reset(); 
        cargarFechaLocal();
        document.getElementById("qtPiezas").value = "";
        document.getElementById("produccion").value = "";
        document.getElementById("rendimiento").value = "";
      } 
    })
    .catch(err => alert("❌ Error: " + err))
    .finally(() => { 
      btn.disabled = false; 
      btn.innerText = "Registrar Producción"; 
    });
  });
</script>
</body>
</html>
